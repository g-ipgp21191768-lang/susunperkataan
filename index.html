<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 Susun Ayat</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
    overflow: hidden;
  }

  /* HEADER & CONTROLS */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(255, 255, 255, 0.4);
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    backdrop-filter: blur(5px);
    z-index: 10;
  }

  h1 {
    margin: 0;
    color: #4a4a4a;
    font-size: 28px;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
  }

  .stats {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  #score {
    font-size: 22px;
    font-weight: bold;
    color: #ff6b6b;
    background: white;
    padding: 5px 15px;
    border-radius: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  /* AUDIO CONTROLS */
  .audio-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    padding: 5px 15px;
    border-radius: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .audio-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 0;
  }

  #volumeSlider {
    cursor: pointer;
    width: 80px;
  }

  /* GAME AREA */
  #game-area {
    flex: 1;
    margin: 20px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.25);
    box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 8px 32px rgba(0,0,0,0.1);
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.5);
  }

  /* MOVING WORDS */
  .word {
    position: absolute;
    padding: 12px 24px;
    font-size: 24px;
    border-radius: 25px;
    cursor: grab;
    font-weight: bold;
    color: #444;
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    user-select: none;
    transition: transform 0.2s;
  }

  .word:active { cursor: grabbing; transform: scale(1.05); }

  .c1 { background: #ffcad4; border: 2px solid #ffb3c1; }
  .c2 { background: #ffd6a5; border: 2px solid #ffc27a; }
  .c3 { background: #fdffb6; border: 2px solid #f6f98b; }
  .c4 { background: #caffbf; border: 2px solid #a0f48e; }
  .c5 { background: #a0c4ff; border: 2px solid #7facff; }

  /* SENTENCE AREA */
  #sentence-container {
    padding: 0 20px;
  }

  #sentence {
    min-height: 100px;
    padding: 20px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.8);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    color: #999;
    border: 3px dashed #bde0fe;
    transition: background 0.3s;
  }

  #sentence.drag-over {
    background: rgba(255, 255, 255, 1);
    border-color: #a0c4ff;
  }

  /* PLACED WORDS */
  .placed {
    background: #bde0fe;
    color: #333;
    padding: 10px 18px;
    border-radius: 15px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: all 0.2s;
  }

  .placed:hover {
    background: #a2d2ff;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
  }

  /* MAIN CONTROLS */
  .controls {
    text-align: center;
    padding: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
  }

  button.action-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: all 0.2s;
    font-family: inherit;
    color: #444;
  }

  button.action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  }

  button.action-btn:active {
    transform: translateY(1px);
  }

  .check { background: #caffbf; border: 2px solid #a0f48e; }
  .reset { background: #a0c4ff; border: 2px solid #7facff; }
  .show { background: #fdffb6; border: 2px solid #f6f98b; }
  .next { background: #ffadad; border: 2px solid #ff8f8f; }

  /* SIGNATURE */
  .signature {
    position: fixed;
    bottom: 5px;
    right: 10px;
    font-size: 12px;
    color: #888;
    opacity: 0.7;
    font-family: Arial, sans-serif;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(3px);
  }

  .modal-content {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 400px;
    width: 90%;
  }

  .modal-content h2 {
    margin-top: 0;
    color: #444;
  }

  .modal-content button {
    margin-top: 20px;
    padding: 10px 30px;
    background: #a0c4ff;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    color: #444;
    transition: all 0.2s;
  }

  .modal-content button:hover {
    background: #8ab6ff;
  }

</style>
</head>

<body>

<div class="header">
  <h1>🌈 Susun Ayat: Kata Pemeri</h1>
  
  <div class="stats">
    <div class="audio-controls">
      <button id="muteBtn" class="audio-btn" onclick="toggleMute()">🔇</button>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.3" oninput="changeVolume()">
    </div>
    
    <div id="score">Markah: 0</div>
  </div>
</div>

<div id="game-area"></div>

<div id="sentence-container">
  <div id="sentence" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
    <span id="placeholder-text">Letakkan perkataan di sini untuk membina ayat anda...</span>
  </div>
</div>

<div class="controls">
  <button class="action-btn check" onclick="checkAnswer()">Semak ✅</button>
  <button class="action-btn reset" onclick="resetGame()">Mula Semula 🔄</button>
  <button class="action-btn show" onclick="showAnswer()">Tunjuk Jawapan 👀</button>
  <button class="action-btn next" onclick="nextSentence()">Seterusnya ➡️</button>
</div>

<!-- Custom Message Box -->
<div id="custom-modal" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <h2 id="modal-title"></h2>
    <p id="modal-message"></p>
    <button id="modal-btn">OK</button>
  </div>
</div>

<div class="signature">T. Zan</div>

<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="popSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
// Sentences from the newly uploaded file (Kata Pemeri)
let sentences = [
  ["Tuduhan", "itu", "adalah", "palsu"],
  ["Encik", "Haikal", "ialah", "seorang", "guru", "yang", "sangat", "berdedikasi"],
  ["Haris", "ialah", "rakan", "karib", "saya"],
  ["Tarikh", "peperiksaan", "adalah", "pada", "20", "Mei"],
  ["Sarawak", "ialah", "negeri", "terbesar", "di", "Malaysia"],
  ["Harga", "kemeja", "ini", "adalah", "sangat", "murah"]
];

let current = 0;
let score = 0;
let moving = true;
let isMusicPlaying = false;

// AUDIO CONTROLS LOGIC
const bgMusic = document.getElementById("bgMusic");
const muteBtn = document.getElementById("muteBtn");
const volumeSlider = document.getElementById("volumeSlider");

bgMusic.volume = volumeSlider.value;

function toggleMute() {
  if (isMusicPlaying) {
    bgMusic.pause();
    muteBtn.innerText = "🔇";
    isMusicPlaying = false;
  } else {
    bgMusic.play().catch(e => console.log("Audio play failed (browser policy)", e));
    muteBtn.innerText = "🔊";
    isMusicPlaying = true;
  }
}

function changeVolume() {
  bgMusic.volume = volumeSlider.value;
  if (bgMusic.volume > 0 && !isMusicPlaying) {
    toggleMute(); // Auto play if user slides volume up
  } else if (bgMusic.volume === "0" && isMusicPlaying) {
    toggleMute(); // Auto pause if user mutes via slider
  }
}

// MODAL LOGIC
function showModal(title, message, isSuccess) {
  document.getElementById('modal-title').innerText = title;
  document.getElementById('modal-message').innerText = message;
  let modal = document.getElementById('custom-modal');
  modal.style.display = 'flex';
  
  let btn = document.getElementById('modal-btn');
  btn.onclick = () => {
    modal.style.display = 'none';
    if (isSuccess) {
      nextSentence();
    }
  };
}

// GAME LOGIC
function loadGame() {
  const gameArea = document.getElementById("game-area");
  gameArea.innerHTML = "";
  moving = true;

  // Reset Placeholder
  document.getElementById("sentence").innerHTML = '<span id="placeholder-text">Letakkan perkataan di sini untuk membina ayat anda...</span>';
  document.getElementById("sentence").style.color = "#999";

  let words = [...sentences[current]];
  words.sort(() => Math.random() - 0.5);

  words.forEach((word, i) => {
    let div = document.createElement("div");
    div.className = "word c" + ((i % 5) + 1);
    div.innerText = word;
    div.draggable = true;

    div.ondragstart = (event) => {
      document.getElementById("popSound").play().catch(e=>{});
      event.dataTransfer.setData("text", word);
    };

    // Keep within bounds (max 85% to avoid clipping)
    div.style.top = Math.random() * 85 + "%";
    div.style.left = Math.random() * 85 + "%";

    gameArea.appendChild(div);
    moveWord(div);
  });
}

function moveWord(el) {
  function animate() {
    if (!moving || !el.parentElement) return;

    let duration = Math.random() * 3 + 4; // 4-7 seconds for a smoother, floaty feel

    el.style.transition = `all ${duration}s ease-in-out`;
    el.style.top = Math.random() * 85 + "%";
    el.style.left = Math.random() * 85 + "%";

    setTimeout(animate, duration * 1000);
  }
  // slight delay before starting animation to let initial render happen
  setTimeout(animate, 100); 
}

function allowDrop(ev) {
  ev.preventDefault();
  document.getElementById("sentence").classList.add("drag-over");
}

function dragLeave(ev) {
  document.getElementById("sentence").classList.remove("drag-over");
}

function drop(ev) {
  ev.preventDefault();
  let sentenceBox = document.getElementById("sentence");
  sentenceBox.classList.remove("drag-over");
  
  let word = ev.dataTransfer.getData("text");
  if (!word) return;

  // Remove placeholder if it exists
  let placeholder = document.getElementById("placeholder-text");
  if (placeholder) placeholder.remove();

  // Find and remove the floating word
  let found = false;
  document.querySelectorAll(".word").forEach(w => {
    if (!found && w.innerText === word) {
      w.remove();
      found = true;
    }
  });

  if (found) {
    let span = document.createElement("span");
    span.className = "placed";
    span.innerText = word;

    span.onclick = function() {
      addBackWord(word);
      this.remove();
      
      // restore placeholder if empty
      if(sentenceBox.children.length === 0) {
        sentenceBox.innerHTML = '<span id="placeholder-text">Letakkan perkataan di sini untuk membina ayat anda...</span>';
      }
    };

    sentenceBox.appendChild(span);
  }
}

function addBackWord(word) {
  let gameArea = document.getElementById("game-area");

  let div = document.createElement("div");
  // Random color assignment
  div.className = "word c" + (Math.floor(Math.random() * 5) + 1); 
  div.innerText = word;
  div.draggable = true;

  div.ondragstart = (event) => {
    document.getElementById("popSound").play().catch(e=>{});
    event.dataTransfer.setData("text", word);
  };

  div.style.top = Math.random() * 85 + "%";
  div.style.left = Math.random() * 85 + "%";

  gameArea.appendChild(div);
  moveWord(div);
}

function checkAnswer() {
  let words = document.querySelectorAll("#sentence .placed");
  let userArray = [];
  words.forEach(w => {
    userArray.push(w.innerText.trim());
  });

  let correctArray = sentences[current];
  let isCorrect = userArray.length > 0 && JSON.stringify(userArray) === JSON.stringify(correctArray);

  if (isCorrect) {
    score++;
    document.getElementById("correctSound").play().catch(e=>{});
    document.getElementById("score").innerText = "Markah: " + score;
    showModal("🎉 Betul!", "Syabas! Anda berjaya menyusun ayat dengan tepat.", true);
  } else {
    document.getElementById("wrongSound").play().catch(e=>{});
    showModal("❌ Kurang Tepat!", "Sila cuba lagi menyusun perkataan tersebut.", false);
  }
}

function showAnswer() {
  moving = false;
  let sentenceBox = document.getElementById("sentence");
  sentenceBox.innerHTML = "";
  
  sentences[current].forEach(word => {
    let span = document.createElement("span");
    span.className = "placed";
    span.innerText = word;
    sentenceBox.appendChild(span);
  });
  
  document.getElementById("game-area").innerHTML = "";
}

function nextSentence() {
  current = (current + 1) % sentences.length;
  loadGame();
}

function resetGame() {
  loadGame();
}

// Init
loadGame();

</script>
</body>
</html>
